#Static Files & Upload Limits
spring.web.resources.static-locations=classpath:/static/,file:/app/uploads/
spring.mvc.static-path-pattern=/uploads/**,/documents/**
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=2KB

#groq CV analysis feature (demo)
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions

#groq Chat Bot feature (demo)
groq.chatbot.api.key=${GROQ_CHATBOT_API_KEY}
groq.chatbot.api.url=https://api.groq.com/openai/v1/chat/completions

