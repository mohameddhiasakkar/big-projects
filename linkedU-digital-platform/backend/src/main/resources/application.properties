spring.application.name=LinkedU Spring Project

#PostgreSQL DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/linkedu_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:linkedu_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=8080


#Front end link
FRONTEND_URL=http://localhost:4200

#PA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

#EMAIL SMTP (GMAIL)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
